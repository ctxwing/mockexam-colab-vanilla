<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP 해시 테스트</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        input { padding: 10px; font-size: 16px; width: 200px; }
        button { padding: 10px 20px; margin-left: 10px; }
        .result { margin-top: 20px; padding: 10px; background: #252526; }
        .match { color: #4ec9b0; }
        .no-match { color: #f48771; }
    </style>
</head>
<body>
    <h1>🔐 OTP 해시 테스트</h1>
    <input type="text" id="otpInput" placeholder="AICE2025" value="AICE2025">
    <button onclick="testHash()">해시 생성 및 비교</button>

    <div class="result" id="result"></div>

    <script>
        // Web Crypto API SHA-256 (auth.js와 동일)
        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text.toUpperCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 저장된 해시 목록 (otp-list.json에서 복사)
        const storedHashes = [
            "1daa23f398fc44f6e8b6bd9cd2092b984d91f87ecc1c85b42eb7df58d84c2132",
            "0bbbd86486e7d405476906d6d41342b842d8a208502c2b0eb3adf71c61c27de7",
            "3abd6ca215c44e0ee334912857e9bdf4cb0735deca9239a57156dab527cbd728",
            "98cf0f8e40463d64053ed8bafbcd8655783f55cbc4710b9600fcdfc5695bac9f",
            "40b8d06970b231fff3c751c5d00788143e87860cdc3890581465e0d2b08744fe",
            "b47dfcc486266e7fdb1a37dfb74eb5658d17e0dcda39163cbfbcf3b43b0a6f77",
            "66a3de54b611c6b059d779b7dcd5076f5134d2b38bfcc6c327d9401e58a9d16b",
            "947d7009422c62e5abe7df1534364d2d5e2f98f53abfd4d90edcc77ccbb5d0d3",
            "f6bb89cdb036652c7e7272acfc3d2032ad74283dcc186671bca348132405936e",
            "3e41732f110155fbea457535d9dbe35a43da862737cc1ccd514bead35e79af5c",
            "c2db5f9030a03ada03a30abf68bf9f5732a5e25b4a2c2fd282a611ce042406e9",
            "226566e38877f9a2e1869a1e6dca3a554fb6178acd52fe955407252e310abfa3",
            "15ac36c9ce3b9ba48100d6ffdad263ca0df8901da5d65a01bd61f40066ab9d49",
            "353c1c35ce04f4f65e050fe0e1cdcafa201b3a12582cca421f838075d9a7ba92",
            "4f85262d0618c3fa0c1314bca72dffc46e1716f5e7d37be4d3eeca212d28db5b",
            "d8b794605377677a5aeba08539c827446bb18805fd800f1d4deb4a783cfd2a8e",
            "c2bdac109c5a70e7692f6a0ef9332f6ba8850d6a3465bfc576df199a9266af1d",
            "bf12adfa4bf64f5ff2875fb15f3d826b025689c3d82a0f371cad85ff04489045",
            "2e3c6c4b8ff214e39936359e81cab115d2122899f3b50dbb4fed77e2001b923a",
            "10e921971895c1d3eb96942ef6cb6c87a9baba37b83adf88369381599f87315d"
        ];

        async function testHash() {
            const input = document.getElementById('otpInput').value.toUpperCase();
            const computed = await sha256(input);
            const match = storedHashes.includes(computed);

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <h3>입력: ${input}</h3>
                <p><strong>생성된 해시:</strong> ${computed}</p>
                <p class="${match ? 'match' : 'no-match'}">
                    ${match ? '✅ 일치!' : '❌ 일치하지 않음'}
                </p>
                <p><strong>저장된 해시 수:</strong> ${storedHashes.length}개</p>
                ${match ? '<p style="color: #4ec9b0;">인증 성공!</p>' : '<p style="color: #f48771;">인증 실패 - 코드를 확인하세요</p>'}
            `;
        }

        // 페이지 로드 시 자동 테스트
        window.onload = () => testHash();
    </script>
</body>
</html>

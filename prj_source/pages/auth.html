<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICE 모의고사 - 도서 인증</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <main id="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo">
                    <img src="../assets/images/aice-logo.png" alt="AICE 로고">
                </div>
                <p class="auth-guide">도서 [페이지 21] 하단에 인쇄된 8자리 난수를 입력해 주세요.</p>
            </div>

            <form id="otp-form" class="otp-form">
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]*">
                    <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]*">
                    <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]*">
                    <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]*">
                    <span class="otp-hyphen">-</span>
                    <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]*">
                    <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]*">
                    <input type="text" class="otp-input" maxlength="1" data-index="6" inputmode="numeric" pattern="[0-9]*">
                    <input type="text" class="otp-input" maxlength="1" data-index="7" inputmode="numeric" pattern="[0-9]*">
                </div>
                <div id="error-message" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-auth">인증하기</button>
                <div class="auth-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-auth">
                        <span>이 브라우저에서 인증 상태 유지</span>
                    </label>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/common.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>

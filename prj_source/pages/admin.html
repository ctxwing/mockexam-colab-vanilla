<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 데이터 관리 - AICE 모의고사</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="header-container">
            <div class="header-logo">
                <h1>📚 시험 데이터 관리</h1>
            </div>
            <div class="header-actions">
                <a href="lobby.html" class="btn btn-ghost">로비로</a>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container">
            <!-- 상단 도구 모음 -->
            <section class="admin-toolbar">
                <div class="toolbar-info">
                    <span class="info-badge">소스: <code>data/exams-source.json</code></span>
                    <span class="info-badge">배포: <code>data/exams.json</code></span>
                </div>
                <div class="toolbar-actions">
                    <button id="add-btn" class="btn btn-primary">+ 시험 추가</button>
                    <button id="download-btn" class="btn btn-secondary">📥 다운로드</button>
                    <button id="upload-btn" class="btn btn-secondary">📤 업로드</button>
                    <input type="file" id="file-input" accept=".json" style="display: none;">
                </div>
            </section>

            <!-- 안내 메시지 -->
            <section class="admin-notice">
                <div class="notice-card">
                    <h3>📋 관리 가이드</h3>
                    <ol>
                        <li>아래 목록에서 시험 데이터를 추가/편집/삭제합니다</li>
                        <li><strong>[저장]</strong> 버튼을 클릭하면 <code>exams-source.json</code> 파일로 다운로드됩니다</li>
                        <li>다운로드한 파일을 <code>prj_source/data/</code> 폴더에 저장합니다</li>
                        <li>터미널에서 <code>node scripts/build-exams.js</code> 실행하여 <code>exams.json</code> 생성</li>
                        <li><code>git commit</code>으로 변경사항을 커밋합니다</li>
                    </ol>
                </div>
            </section>

            <!-- 시험 목록 -->
            <section class="exam-list">
                <div id="exam-list-container">
                    <!-- 동적으로 생성됨 -->
                </div>
            </section>

            <!-- 저장 버튼 (고정) -->
            <div class="admin-footer">
                <button id="save-btn" class="btn btn-primary btn-large">💾 저장하기 (다운로드)</button>
            </div>
        </div>
    </main>

    <!-- 편집 모달 -->
    <div id="edit-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">시험 편집</h2>
                <button id="modal-close" class="btn-close">&times;</button>
            </div>
            <form id="exam-form" class="modal-body">
                <input type="hidden" id="exam-id">

                <div class="form-group">
                    <label for="exam-title">제목 *</label>
                    <input type="text" id="exam-title" required>
                </div>

                <div class="form-group">
                    <label for="exam-description">설명 *</label>
                    <textarea id="exam-description" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="exam-colab">Google Colab URL *</label>
                    <input type="url" id="exam-colab" required>
                </div>

                <div class="form-group">
                    <label for="exam-solution">정답 및 해설 경로 *</label>
                    <input type="text" id="exam-solution" required>
                </div>

                <div class="form-group">
                    <label for="exam-lecture">강의/참고자료 URL</label>
                    <input type="url" id="exam-lecture">
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="exam-active">
                        활성 상태 (빌드 시 포함)
                    </label>
                </div>

                <div class="modal-footer">
                    <button type="button" id="modal-cancel" class="btn btn-ghost">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>

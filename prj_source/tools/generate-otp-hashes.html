<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP 해시 생성기 (Web Crypto API)</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        h1 { color: #4ec9b0; }
        textarea { width: 100%; height: 200px; font-family: monospace; padding: 10px; margin: 10px 0; background: #252526; color: #d4d4d4; border: 1px solid #3c3c3c; }
        button { padding: 10px 20px; background: #0e639c; color: white; border: none; cursor: pointer; margin: 5px 0; }
        button:hover { background: #1177bb; }
        .output { margin-top: 20px; }
        pre { background: #252526; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <h1 style="margin: 0;">🔐 OTP 해시 생성기</h1>
            <small style="color: #858585;">SHA-256 Web Crypto API</small>
        </div>
        <button onclick="logout()" style="padding: 8px 16px; background: #f48771;">로그아웃</button>
    </div>
    <p>원본 OTP 코드를 JSON 형식으로 입력하세요:</p>
    <textarea id="input" placeholder='{
  "codes": [
    "AICE2025",
    "AICE2026"
  ]
}'></textarea>
    <button onclick="generateHashes()">해시 생성</button>
    <button onclick="copyOutput()">결과 복사</button>
    <button onclick="clearOutput()">지우기</button>

    <div class="output">
        <h3>생성된 해시:</h3>
        <pre id="output"></pre>
    </div>

    <script>
        // 인증 체크
        window.onload = function() {
            const auth = sessionStorage.getItem('adminAuth');
            const authTime = sessionStorage.getItem('authTime');

            if (auth !== 'true' || !authTime) {
                window.location.href = 'admin.html';
                return;
            }

            // 30분 경과 체크
            const elapsed = Date.now() - parseInt(authTime);
            if (elapsed > 30 * 60 * 1000) {
                sessionStorage.removeItem('adminAuth');
                sessionStorage.removeItem('authTime');
                window.location.href = 'admin.html';
                return;
            }
        };

        function logout() {
            sessionStorage.removeItem('adminAuth');
            sessionStorage.removeItem('authTime');
            window.location.href = 'admin.html';
        }

        // SHA-256 (브라우저 네이티브 Web Crypto API)
        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text.toUpperCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function generateHashes() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');

            try {
                const data = JSON.parse(input);
                const codes = data.codes || [];

                if (codes.length === 0) {
                    output.textContent = '오류: codes 배열이 비어있습니다.';
                    return;
                }

                const hashes = [];
                for (const code of codes) {
                    const hash = await sha256(code);
                    hashes.push(hash);
                }

                let result = `{\n  "hashes": [\n`;
                hashes.forEach((hash, index) => {
                    result += `    "${hash}"`;
                    if (index < hashes.length - 1) result += ',';
                    result += `  // ${codes[index]}\n`;
                });
                result += `  ]\n}`;

                output.textContent = result;
            } catch (e) {
                output.textContent = 'JSON 파싱 오류: ' + e.message;
            }
        }

        function copyOutput() {
            const output = document.getElementById('output').textContent;
            navigator.clipboard.writeText(output).then(() => {
                alert('클립보드에 복사되었습니다!');
            });
        }

        function clearOutput() {
            document.getElementById('output').textContent = '';
        }

        // 기본값 설정
        document.getElementById('input').value = `{
  "codes": [
    "AICE2025",
    "AICE2026",
    "AICE2027",
    "AICE2028",
    "AICE2029",
    "BIGD2025",
    "BIGD2026",
    "BIGD2027",
    "BIGD2028",
    "BIGD2029",
    "DATA2025",
    "DATA2026",
    "DATA2027",
    "DATA2028",
    "DATA2029",
    "MLAI2025",
    "MLAI2026",
    "MLAI2027",
    "MLAI2028",
    "MLAI2029"
  ]
}`;
    </script>
</body>
</html>
